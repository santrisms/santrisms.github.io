<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="YouTube Live Comment Battle - Pertarungan komentar real-time untuk live streaming YouTube">
    <meta name="keywords" content="YouTube, Live, Comment, Battle, Counter, Real-time, Streaming">
    <title>🔥 YouTube Live Comment Battle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ==================== TOAST CONTAINER ==================== -->
    <div id="toast-container"></div>



    <!-- ==================== BATTLE DISPLAY ==================== -->
    <section id="battle-display" class="battle-display">

        <!-- Background Effects -->
        <div class="battle-bg">
            <div class="bg-gradient"></div>
            <div class="bg-particles" id="bg-particles"></div>
        </div>

        <!-- Top Controls -->
        <div class="battle-controls">
            <div class="control-left" style="display: flex; gap: 10px; align-items: center; position: relative;">
                <button id="btn-back" class="btn-control" title="Kembali ke Admin (Esc)">
                    ← Kembali
                </button>
                
                <!-- BGM CONTROLLER POPOVER IN TOP BAR -->
                <div class="audio-control-container" style="position: relative; display: inline-block;">
                    <button id="btn-audio-popover-toggle" class="btn-control btn-key-live" title="Pengaturan Musik">
                        🎵 Musik
                    </button>
                    <div id="audio-settings-popover" class="audio-settings-popover hidden">
                        <div class="popover-header">
                            <h4>🎵 Kontrol BGM</h4>
                        </div>
                        <div class="popover-body">
                            <div class="popover-status">
                                Status: <strong id="audio-status-text">Musik Mati</strong>
                            </div>
                            <div class="popover-track-selection" style="margin-bottom: 6px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 6px;">
                                <label style="font-size: 0.72rem; color: var(--text-secondary); display:block; margin-bottom: 2px;">Pilih Track:</label>
                                <select id="audio-track-select" style="width: 100%; font-size: 0.75rem; background: rgba(10, 0, 21, 0.9); border: 1px solid rgba(255,255,255,0.12); color:#fff; padding: 4px; border-radius: 4px; cursor: pointer;">
                                    <option value="none">Kosong</option>
                                </select>
                            </div>
                            <div class="popover-actions">
                                <button id="btn-audio-play" class="btn-audio-action" title="Play">▶ Play</button>
                                <button id="btn-audio-pause" class="btn-audio-action" title="Pause">⏸ Pause</button>
                                <button id="btn-audio-stop" class="btn-audio-action" title="Stop">⏹ Stop</button>
                            </div>
                            <div class="popover-volume">
                                <span>🔊</span>
                                <input type="range" id="audio-volume" min="0" max="1" step="0.05" value="0.5">
                            </div>
                            <div class="popover-loop">
                                <label>
                                    <input type="checkbox" id="audio-loop" checked> Ulangi Musik (Loop)
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="control-right" style="display: flex; gap: 10px; align-items: center; position: relative;">
                <button id="btn-fullscreen" class="btn-control" title="Fullscreen (F)">
                    ⛶ Fullscreen
                </button>
            </div>
        </div>

        <!-- Battle Header -->
        <div class="battle-header-scale-wrapper">
            <div class="battle-header">
                <h1 id="display-title" class="battle-title">⚽ PERTARUNGAN KOMENTAR TERBESAR!</h1>
            </div>
        </div>

        <!-- Scoreboard -->
        <div class="scoreboard-scale-wrapper">
            <div class="scoreboard">
                <!-- Player 1 -->
                <div class="player-card player-1">
                    <div class="player-photo-wrapper">
                        <img id="p1-photo" class="player-photo" src="" alt="Player 1">
                        <div class="photo-glow"></div>
                    </div>
                    <h2 id="p1-name" class="player-name">RONALDO</h2>
                    <!-- NEW: Action Display Badge -->
                    <div id="p1-action-badge" class="player-action-badge hidden">
                        <span class="action-emoji">👍</span>
                        <span class="action-text">LIKE</span>
                    </div>
                    <div class="score-wrapper">
                        <span id="p1-score" class="player-score">0</span>
                        <div class="score-increment-area" id="p1-increment-area"></div>
                    </div>
                </div>

                <!-- VS Badge -->
                <div class="vs-badge">
                    <span class="vs-text">VS</span>
                </div>

                <!-- Player 2 -->
                <div class="player-card player-2">
                    <div class="player-photo-wrapper">
                        <img id="p2-photo" class="player-photo" src="" alt="Player 2">
                        <div class="photo-glow"></div>
                    </div>
                    <h2 id="p2-name" class="player-name">MESSI</h2>
                    <!-- NEW: Action Display Badge -->
                    <div id="p2-action-badge" class="player-action-badge hidden">
                        <span class="action-emoji">👍</span>
                        <span class="action-text">LIKE</span>
                    </div>
                    <div class="score-wrapper">
                        <span id="p2-score" class="player-score">0</span>
                        <div class="score-increment-area" id="p2-increment-area"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-labels">
                <span id="p1-percent" class="progress-label label-p1">0%</span>
                <span id="p2-percent" class="progress-label label-p2">0%</span>
            </div>
            <div class="progress-bar">
                <div id="p1-bar" class="progress-fill fill-p1" style="width: 0%;"></div>
                <div id="p2-bar" class="progress-fill fill-p2" style="width: 0%;"></div>
            </div>
        </div>

        <!-- Trigger Text -->
        <div class="trigger-scale-wrapper">
            <div class="trigger-text-wrapper">
                <p id="display-trigger" class="trigger-text">🔥 Ketik RONALDO atau MESSI di komentar live! 🔥</p>
            </div>
        </div>

        <!-- Live Comment Feed -->
        <div class="live-feed-scale-wrapper">
            <div class="live-feed">
                <div class="feed-header">
                    <div class="live-indicator">
                        <span class="live-dot"></span>
                        <span class="live-label">LIVE COMMENTS</span>
                    </div>
                    <div class="feed-stats">
                        <span>Total: <strong id="total-comments">0</strong></span>
                        <span class="stats-divider">|</span>
                        <span><strong id="comments-per-min">0</strong>/menit</span>
                        <span class="stats-divider">|</span>
                        <span id="connection-status" class="status-connecting">⏳ Menghubungkan...</span>
                    </div>
                </div>
                <div id="feed-container" class="feed-container">
                    <div class="feed-empty">
                        <span class="feed-empty-icon">💬</span>
                        <p>Menunggu komentar masuk...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Banner / CTA -->
        <div class="cta-scale-wrapper">
            <div class="bottom-cta-wrapper">
                <p id="display-cta" class="bottom-cta-text">🔔 Jangan lupa LIKE, COMMENT, dan SUBSCRIBE! 🔔</p>
            </div>
        </div>

    </section>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="app.js?v=6.3"></script>
</body>
</html>
